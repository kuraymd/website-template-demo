<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#1A1A2E"/>
  <!-- グリッドパターン -->
  <defs>
    <pattern id="g" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#g)"/>
  <!-- ボーダー -->
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <!-- コーナーブラケット -->
  <polyline points="14,486 14,14 786,14" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <polyline points="786,486 786,486 14,486" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <!-- ラベル -->
  <text x="400" y="242" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="12" fill="#C9A84C" opacity="0.6" letter-spacing="2">gallery-06.jpg</text>
  <text x="400" y="264" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="10" fill="#C9A84C" opacity="0.3" letter-spacing="1">800 × 500 px</text>
  <!-- ゴールドのダイヤ -->
  <rect x="396" y="212" width="8" height="8" fill="#C9A84C" opacity="0.5" transform="rotate(45,400,216)"/>
</svg>
