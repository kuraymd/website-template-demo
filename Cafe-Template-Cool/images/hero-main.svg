<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#1A1A2E"/>
  <!-- グリッドパターン -->
  <defs>
    <pattern id="g" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#g)"/>
  <!-- ボーダー -->
  <rect x="1" y="1" width="598" height="598" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <!-- コーナーブラケット -->
  <polyline points="14,586 14,14 586,14" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <polyline points="586,586 586,586 14,586" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <!-- ラベル -->
  <text x="300" y="292" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="12" fill="#C9A84C" opacity="0.6" letter-spacing="2">hero-main.jpg</text>
  <text x="300" y="314" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="10" fill="#C9A84C" opacity="0.3" letter-spacing="1">600 × 600 px</text>
  <!-- ゴールドのダイヤ -->
  <rect x="296" y="262" width="8" height="8" fill="#C9A84C" opacity="0.5" transform="rotate(45,300,266)"/>
</svg>
