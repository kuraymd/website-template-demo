<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <rect width="600" height="450" fill="#20203A"/>
  <!-- グリッドパターン -->
  <defs>
    <pattern id="g" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="450" fill="url(#g)"/>
  <!-- ボーダー -->
  <rect x="1" y="1" width="598" height="448" fill="none" stroke="#0F9B8E" stroke-width="1" opacity="0.5"/>
  <!-- コーナーブラケット -->
  <polyline points="14,436 14,14 586,14" fill="none" stroke="#0F9B8E" stroke-width="1" opacity="0.4"/>
  <polyline points="586,436 586,436 14,436" fill="none" stroke="#0F9B8E" stroke-width="1" opacity="0.4"/>
  <!-- ラベル -->
  <text x="300" y="217" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="12" fill="#0F9B8E" opacity="0.6" letter-spacing="2">map-placeholder.jpg</text>
  <text x="300" y="239" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="10" fill="#0F9B8E" opacity="0.3" letter-spacing="1">600 × 450 px</text>
  <!-- ゴールドのダイヤ -->
  <rect x="296" y="187" width="8" height="8" fill="#0F9B8E" opacity="0.5" transform="rotate(45,300,191)"/>
</svg>
