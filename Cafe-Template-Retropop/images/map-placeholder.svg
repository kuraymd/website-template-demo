<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <rect width="600" height="450" fill="#E8E4DC"/>
  <!-- 簡易マップ風グリッド -->
  <line x1="0" y1="150" x2="600" y2="150" stroke="#ccc" stroke-width="1"/>
  <line x1="0" y1="300" x2="600" y2="300" stroke="#ccc" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#ccc" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#ccc" stroke-width="1"/>
  <!-- 道路 -->
  <rect x="0" y="195" width="600" height="20" fill="#D0C9BC"/>
  <rect x="275" y="0" width="20" height="450" fill="#D0C9BC"/>
  <!-- ピン -->
  <circle cx="300" cy="210" r="22" fill="#F2607D" stroke="#333" stroke-width="3"/>
  <polygon points="300,245 285,215 315,215" fill="#F2607D" stroke="#333" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="300" cy="210" r="8" fill="#fff"/>
  <!-- ラベル -->
  <rect x="140" y="305" width="320" height="70" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#333">Velvet Spoon</text>
  <text x="300" y="356" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">Googleマップ埋め込みエリア（600 × 450 px）</text>
</svg>
