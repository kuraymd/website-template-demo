<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" width="560" height="480">
  <!-- 背景 -->
  <rect width="560" height="480" fill="#111111"/>
  <!-- グリッドパターン -->
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
    <!-- ノイズフィルタ（雰囲気演出） -->
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="overlay" result="blend"/></filter>
  </defs>
  <rect width="560" height="480" fill="url(#g)"/>
  <!-- 深紅グロー -->
  <radialGradient id="glow" cx="30%" cy="70%" r="50%">
    <stop offset="0%" stop-color="rgba(139,0,0,0.12)"/>
    <stop offset="100%" stop-color="rgba(139,0,0,0)"/>
  </radialGradient>
  <rect width="560" height="480" fill="url(#glow)"/>
  <!-- ゴールドボーダー -->
  <rect x="1" y="1" width="558" height="478" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.35"/>
  <!-- コーナーブラケット -->
  <path d="M 16,464 L 16,16 544,16" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <path d="M 544,464 L 544,464 16,464" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <!-- ✦ 装飾 -->
  <text x="280" y="218" text-anchor="middle" dominant-baseline="middle" font-family="serif" font-size="10" fill="#C9A84C" opacity="0.4">✦</text>
  <!-- ラベル -->
  <text x="280" y="240" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-size="12" fill="#C9A84C" opacity="0.55" font-style="italic" letter-spacing="1">about-shop.jpg</text>
  <text x="280" y="260" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="9" fill="#C9A84C" opacity="0.28" letter-spacing="1">560 × 480 px</text>
</svg>
