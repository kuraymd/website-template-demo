<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!-- 背景 -->
  <rect width="600" height="600" fill="#0D0D0D"/>
  <!-- グリッドパターン -->
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
    <!-- ノイズフィルタ（雰囲気演出） -->
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="overlay" result="blend"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#g)"/>
  <!-- 深紅グロー -->
  <radialGradient id="glow" cx="30%" cy="70%" r="50%">
    <stop offset="0%" stop-color="rgba(139,0,0,0.12)"/>
    <stop offset="100%" stop-color="rgba(139,0,0,0)"/>
  </radialGradient>
  <rect width="600" height="600" fill="url(#glow)"/>
  <!-- ゴールドボーダー -->
  <rect x="1" y="1" width="598" height="598" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.35"/>
  <!-- コーナーブラケット -->
  <path d="M 16,584 L 16,16 584,16" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <path d="M 584,584 L 584,584 16,584" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <!-- ✦ 装飾 -->
  <text x="300" y="278" text-anchor="middle" dominant-baseline="middle" font-family="serif" font-size="10" fill="#C9A84C" opacity="0.4">✦</text>
  <!-- ラベル -->
  <text x="300" y="300" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-size="12" fill="#C9A84C" opacity="0.55" font-style="italic" letter-spacing="1">hero-main.jpg</text>
  <text x="300" y="320" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="9" fill="#C9A84C" opacity="0.28" letter-spacing="1">600 × 600 px</text>
</svg>
